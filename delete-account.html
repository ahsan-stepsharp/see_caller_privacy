<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Deletion Portal - See Caller</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        h1 { color: #B42318; font-weight: 800; }
        p { color: #666; }
        .card { border: 1px solid #eee; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 30px; background: white; }
        input[type="email"] { width: 100%; padding: 14px; margin: 10px 0 20px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input[type="email"]:focus { border-color: #B42318; outline: none; }
        button { background-color: #B42318; color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; box-shadow: 0 4px 12px rgba(180, 35, 24, 0.2); }
        button:hover { background-color: #911c13; transform: translateY(-1px); }
        .info { font-size: 0.9em; color: #444; margin-top: 30px; text-align: left; background: #FFF5F5; padding: 20px; border-radius: 12px; border-left: 4px solid #B42318; }
        .info ul { padding-left: 20px; margin: 10px 0 0 0; }
        .info li { margin-bottom: 8px; }
        label { display: block; text-align: left; font-weight: bold; margin-bottom: 8px; color: #333; }
    </style>
</head>
<body>
    <h1>Data Deletion</h1>
    <p>Permanently remove your account and identification history.</p>

    <div class="card">
        <label for="email">Registered Google Email</label>
        <input type="email" id="email" placeholder="yourname@gmail.com" required>

        <button onclick="sendDeletionEmail()">Request Data Purge</button>

        <div class="info">
            <strong>Important Notice:</strong>
            <ul>
                <li>We will purge all hashed contact contributions linked to your email.</li>
                <li>Your account access will be permanently revoked.</li>
                <li>Processing takes 48-72 hours.</li>
            </ul>
        </div>
    </div>

    <script>
        function sendDeletionEmail() {
            const emailInput = document.getElementById('email');
            const userEmail = emailInput.value.trim();

            if (!userEmail || !userEmail.includes('@')) {
                alert('Please enter a valid registered email address.');
                return;
            }

            const recipient = "maali22786@gmail.com";
            const subject = encodeURIComponent("Data Deletion Request: " + userEmail);
            const body = encodeURIComponent(
                "Hello See Caller Support,\n\n" +
                "I am requesting the permanent deletion of my account and all associated data from the See Caller platform.\n\n" +
                "Registered Email: " + userEmail + "\n" +
                "Request Type: Full Account & Hashed Data Purge\n\n" +
                "I understand that this action is irreversible and will remove my contributions to the shared identification index.\n\n" +
                "Regards,\n" +
                "See Caller User"
            );

            window.location.href = `mailto:${recipient}?subject=${subject}&body=${body}`;
        }
    </script>

    <p style="margin-top: 40px;"><a href="privacy.html" style="color: #666; text-decoration: none;">&larr; Back to Privacy Policy</a></p>
</body>
</html>
